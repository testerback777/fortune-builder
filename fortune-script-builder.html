<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운세 대본 빌더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a6030;
    --bg: #0e0c08;
    --surface: #1a1508;
    --surface2: #221c0e;
    --border: rgba(201,168,76,0.2);
    --border-bright: rgba(201,168,76,0.5);
    --text: #e8d8a0;
    --text-dim: #8a7848;
    --text-muted: #5a4e30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%);
  }
  .container { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  .header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .header-icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
  .header h1 { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; color: var(--gold-light); letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  .header p { font-size: 0.82rem; color: var(--text-dim); line-height: 1.6; }
  .section { margin-bottom: 1.5rem; }
  .section-label { font-size: 0.75rem; font-weight: 500; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  input[type="password"], input[type="text"], input[type="number"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--text); font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--border-bright); }
  input::placeholder { color: var(--text-muted); }
  .api-guide { font-size: 0.72rem; color: var(--text-dim); margin-top: 6px; display: block; }
  .api-guide a { color: var(--gold-dim); text-decoration: none; }
  .api-guide a:hover { color: var(--gold); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .select-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 16px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.8rem; color: var(--text-dim); cursor: pointer; transition: all 0.2s; background: transparent; font-family: 'Noto Sans KR', sans-serif;
  }
  .chip:hover { border-color: var(--border-bright); color: var(--text); }
  .chip.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
  .generate-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #c9a84c, #a07830); border: none; border-radius: 10px; font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: #1a1000; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .result-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; font-size: 0.92rem; line-height: 2; color: var(--text); white-space: pre-wrap; word-break: break-word; min-height: 100px;
  }
  .result-actions { display: flex; gap: 10px; margin-top: 12px; }
  .action-btn { padding: 8px 18px; background: transparent; border: 1px solid var(--border); border-radius: 8px; font-size: 0.8rem; color: var(--text-dim); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
  .action-btn:hover { border-color: var(--border-bright); color: var(--gold); }
  .action-btn.primary { border-color: var(--gold); color: var(--gold); }
  .loading { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.88rem; }
  .error-box { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); border-radius: 10px; padding: 14px 16px; font-size: 0.85rem; color: #e88; line-height: 1.6; }
  .key-saved { font-size: 0.72rem; color: #4caf50; margin-top: 5px; display: none; }
  .topic-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--text); font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s; margin-top: 10px; }
  .topic-input:focus { border-color: var(--border-bright); }
  .topic-input::placeholder { color: var(--text-muted); }
  .footer { text-align: center; margin-top: 3rem; font-size: 0.72rem; color: var(--text-muted); }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-icon">📜</span>
    <h1>운세 대본 빌더</h1>
    <p>주제와 말투를 선택하면 숏츠용 운세 대본을 자동 생성해줍니다</p>
  </div>

  <div class="section">
    <div class="section-label">Gemini API 키</div>
    <div style="display:flex; gap:10px;">
      <input type="password" id="apiKey" placeholder="AIzaSy..." />
      <button class="generate-btn" style="width:auto; padding:10px 16px; font-size:0.82rem; font-family:'Noto Sans KR',sans-serif; font-weight:500;" onclick="saveKey()">저장</button>
    </div>
    <span class="api-guide">키 발급 → <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> · 무료 · 카드 불필요</span>
    <div id="keySaved" class="key-saved">✓ 저장됨</div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="section-label">주제 선택</div>
    <div class="select-group" id="topicGroup">
      <button class="chip active" data-val="이번 주 대박 터지는 띠 TOP3">💰 이번 주 대박 띠</button>
      <button class="chip" data-val="이번 주 금전운 좋은 띠 TOP3">💵 금전운</button>
      <button class="chip" data-val="이번 주 연애운 터지는 띠 TOP3">💕 연애운</button>
      <button class="chip" data-val="이번 주 조심해야 할 띠 TOP3">⚠️ 조심할 띠</button>
      <button class="chip" data-val="이번 주 로또 당첨 기운 강한 띠 TOP3">🎰 로또운</button>
      <button class="chip" data-val="이번 주 직장운 강한 띠 TOP3">💼 직장운</button>
      <button class="chip" data-val="custom">✏️ 직접입력</button>
    </div>
    <input type="text" class="topic-input" id="customTopic" placeholder="주제를 직접 입력하세요..." style="display:none;" />
  </div>

  <div class="section">
    <div class="section-label">말투 선택</div>
    <div class="select-group" id="styleGroup">
      <button class="chip active" data-val="신선할배">🧙 신선할배</button>
      <button class="chip" data-val="무당">🔮 무당</button>
      <button class="chip" data-val="선녀">🧚 선녀</button>
      <button class="chip" data-val="아기">🍼 아기</button>
      <button class="chip" data-val="점쟁이 아저씨">🎴 점쟁이 아저씨</button>
      <button class="chip" data-val="도사">☯️ 도사</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">영상 길이</div>
    <div class="select-group" id="lengthGroup">
      <button class="chip active" data-val="30초 분량 (200자 내외)">30초</button>
      <button class="chip" data-val="1분 분량 (400자 내외)">1분</button>
      <button class="chip" data-val="1분 30초 분량 (600자 내외)">1분 30초</button>
    </div>
  </div>

  <button class="generate-btn" onclick="generate()" id="genBtn">✦ 대본 생성</button>

  <hr class="divider">

  <div id="results"></div>

  <div class="footer">생성된 대본을 프롬프트 빌더에 붙여넣어 이미지 프롬프트도 만들어보세요</div>
</div>

<script>
// 칩 선택 로직
document.querySelectorAll('.select-group').forEach(group => {
  group.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (group.id === 'topicGroup') {
        document.getElementById('customTopic').style.display = chip.dataset.val === 'custom' ? 'block' : 'none';
      }
    });
  });
});

function getSelected(groupId) {
  const active = document.querySelector(`#${groupId} .chip.active`);
  return active ? active.dataset.val : '';
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('fortune_gemini_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('keySaved').style.display = 'block';
  }
});

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return;
  localStorage.setItem('fortune_gemini_key', key);
  const el = document.getElementById('keySaved');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}

const STYLE_PROMPTS = {
  '신선할배': `허허... 자네 왔는가. 로 시작하는 신선 할아버지 말투. "허허", "~라네", "~이여", "자네", "할배 말 들으시게" 같은 표현 사용. 느리고 여유있게. 중간중간 "허허허" 추임새.`,
  '무당': `신내림 받은 무당 말투. "신께서 이르시길", "기운이 느껴지네요", "~하실 것이오", "영험한 기운이" 같은 표현. 신비롭고 강렬하게. 중간중간 운명적 느낌.`,
  '선녀': `하늘에서 내려온 선녀 말투. "하늘의 기운을 전해드릴게요", "복이 내려옵니다", "~하실 거예요 호호", 부드럽고 우아하게. 중간중간 "호호" 웃음.`,
  '아기': `아기가 운세 알려주는 콘셉트. "이번 주에 복이 올 거야~", "~띠는 짱짱이야!", "헤헤", 귀엽고 통통 튀게. 반말체. 중간중간 "응응", "히히" 추임새.`,
  '점쟁이 아저씨': `동네 점집 아저씨 말투. "야 이거 봐봐", "내가 딱 보니까", "틀림없어 이게", 친근하고 직설적으로. 반말체. 확신에 찬 느낌.`,
  '도사': `산속 도사 말투. "천기를 누설하노라", "~할지어다", "도의 흐름으로 보건대", 고풍스럽고 엄숙하게. 짧고 강렬한 문장들.`
};

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('API 키를 입력해주세요.'); return; }

  let topic = getSelected('topicGroup');
  if (topic === 'custom') {
    topic = document.getElementById('customTopic').value.trim();
    if (!topic) { alert('주제를 입력해주세요.'); return; }
  }

  const style = getSelected('styleGroup');
  const length = getSelected('lengthGroup');
  const styleDesc = STYLE_PROMPTS[style] || '';

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '✦ 생성 중...';
  document.getElementById('results').innerHTML = '<div class="loading">✦ 대본을 생성하고 있어요...</div>';

  const systemPrompt = `당신은 유튜브 숏츠용 운세 대본 작가입니다.

말투 규칙:
${styleDesc}

대본 구조 규칙:
1. 인트로: 시청자 이목을 끄는 후킹 문장 (영상 넘기지 말라는 느낌)
2. 중간: 주제 소개 + 분위기 설명
3. 띠별 설명: 각 띠마다 한 문단씩, 구체적이고 현실감 있게
4. 마무리: 복주머니나 행운 관련 멘트로 마무리

규칙:
- 문단과 문단 사이는 반드시 빈 줄로 구분
- 매번 다른 내용과 표현 사용 (반복 금지)
- ${length}
- TTS로 읽기 좋게 자연스러운 문장
- 이모지 사용 금지`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [{ text: `${systemPrompt}\n\n주제: ${topic}\n말투: ${style}\n\n위 주제와 말투로 숏츠용 운세 대본을 작성해주세요.` }]
        }],
        generationConfig: { temperature: 0.9, maxOutputTokens: 1000 }
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API 오류 ${response.status}`);
    }

    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (!text) throw new Error('응답이 비어있어요.');

    renderResult(text, topic, style);
  } catch(e) {
    document.getElementById('results').innerHTML = `<div class="error-box">⚠ 오류: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✦ 대본 생성';
  }
}

function renderResult(text, topic, style) {
  document.getElementById('results').innerHTML = `
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <span class="section-label" style="margin:0;">생성된 대본</span>
      <span style="font-size:0.75rem; color:var(--text-muted);">${topic} · ${style}</span>
    </div>
    <div class="result-box" id="scriptResult">${escapeHtml(text)}</div>
    <div class="result-actions">
      <button class="action-btn primary" onclick="copyResult(this)">복사</button>
      <button class="action-btn" onclick="generate()">다시 생성 ↺</button>
    </div>
  `;
}

function copyResult(btn) {
  const text = document.getElementById('scriptResult').innerText;
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  btn.textContent = '복사됨 ✓';
  setTimeout(() => btn.textContent = '복사', 2000);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
