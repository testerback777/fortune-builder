<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운세 프롬프트 빌더 (무료)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a6030;
    --bg: #0e0c08;
    --bg2: #161208;
    --surface: #1a1508;
    --surface2: #221c0e;
    --border: rgba(201,168,76,0.2);
    --border-bright: rgba(201,168,76,0.5);
    --text: #e8d8a0;
    --text-dim: #8a7848;
    --text-muted: #5a4e30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%);
  }
  .container { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  .header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .header-icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
  .header h1 { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; color: var(--gold-light); letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  .header p { font-size: 0.82rem; color: var(--text-dim); line-height: 1.6; }
  .badge { display: inline-block; background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); border-radius: 20px; padding: 3px 12px; font-size: 0.72rem; color: #81c784; margin-top: 8px; }
  .section { margin-bottom: 1.5rem; }
  .section-label { font-size: 0.75rem; font-weight: 500; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-size: 0.88rem; color: var(--text); font-family: 'Noto Sans KR', sans-serif; line-height: 1.7; resize: vertical; min-height: 220px; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--border-bright); }
  textarea::placeholder { color: var(--text-muted); font-size: 0.82rem; line-height: 1.8; }
  .generate-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #c9a84c, #a07830); border: none; border-radius: 10px; font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: #1a1000; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.99); }
  .reset-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; color: var(--text-dim); cursor: pointer; transition: border-color 0.2s, color 0.2s; margin-top: 8px; }
  .reset-btn:hover { border-color: var(--border-bright); color: var(--text); }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .results-count { font-size: 0.78rem; color: var(--text-dim); }
  .scene-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; transition: border-color 0.2s; animation: fadeIn 0.3s ease forwards; opacity: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .scene-card:hover { border-color: var(--border-bright); }
  .scene-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .scene-num { font-size: 0.7rem; font-weight: 500; color: var(--bg); background: var(--gold-dim); padding: 2px 8px; border-radius: 20px; }
  .scene-type-badge { font-size: 0.7rem; color: var(--text-dim); background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); }
  .scene-script { font-size: 0.82rem; color: var(--text-dim); line-height: 1.6; padding: 8px 12px; border-left: 2px solid var(--gold-dim); margin-bottom: 12px; background: rgba(0,0,0,0.2); border-radius: 0 6px 6px 0; }
  .prompt-label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .prompt-text { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 10px 12px; font-size: 0.78rem; color: #b8a060; line-height: 1.7; font-family: 'Courier New', monospace; word-break: break-all; }
  .card-copy-btn { margin-top: 10px; padding: 5px 14px; background: transparent; border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; color: var(--text-dim); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
  .card-copy-btn:hover { border-color: var(--border-bright); color: var(--gold); }
  .card-copy-btn.copied { color: #4caf50; border-color: rgba(76,175,80,0.4); }
  .copy-all-btn { width: 100%; margin-top: 4px; padding: 12px; background: transparent; border: 1px solid var(--border-bright); border-radius: 8px; font-size: 0.85rem; color: var(--gold); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: background 0.2s; }
  .copy-all-btn:hover { background: rgba(201,168,76,0.08); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .footer { text-align: center; margin-top: 3rem; font-size: 0.72rem; color: var(--text-muted); }
  .error-box { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); border-radius: 10px; padding: 14px 16px; font-size: 0.85rem; color: #e88; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-icon">🔮</span>
    <h1>운세 이미지 프롬프트 빌더</h1>
    <p>대본을 붙여넣으면 Google Flow용 이미지 프롬프트를 자동 생성해줍니다<br>황금 글로우 3D 실사 스타일 · 띠별 자동 인식</p>
    <span class="badge">✓ 완전 무료 · API 불필요 · 인터넷 없어도 됨</span>
  </div>

  <div class="section">
    <div class="section-label">운세 대본</div>
    <textarea id="script" placeholder="대본을 여기에 붙여넣으세요. 빈 줄로 문단을 나눠주세요.

예시:

지금 이 영상 넘기시면, 이번 주 들어오는 중요한 기회 놓치실 수도 있습니다.

먼저 뱀띠. 막혀 있던 금전 흐름이 서서히 풀리기 시작합니다.

다음은 소띠. 이번 주는 사람운이 강하게 작용합니다.

마지막, 돼지띠. 이번 주는 흐름 자체가 다릅니다.

이번 주는, 들어오는 흐름을 정확히 잡는 사람이 결과를 가져갑니다."></textarea>
  </div>

  <button class="generate-btn" onclick="generate()">✦ 프롬프트 생성</button>
  <button class="reset-btn" onclick="reset()">초기화</button>

  <hr class="divider">
  <div id="results"></div>
  <div class="footer">Lapin Flow Generator와 함께 사용 · 전체 복사 후 Lapin에 붙여넣기</div>
</div>

<script>
// 12띠 키워드 매핑
const ZODIAC_MAP = [
  { keys: ['쥐띠','자띠','쥐 띠'], animal: '쥐', en: 'golden rat with tiny golden crown, sitting upright, regal pose' },
  { keys: ['소띠','축띠','소 띠'], animal: '소', en: 'golden ox with powerful muscular build, strong stance, head raised proudly' },
  { keys: ['호랑이띠','인띠','호랑이 띠','범띠'], animal: '호랑이', en: 'golden tiger with fierce glowing eyes, powerful crouching stance, fur gleaming' },
  { keys: ['토끼띠','묘띠','토끼 띠'], animal: '토끼', en: 'golden rabbit with elegant long ears, graceful sitting pose, soft golden fur' },
  { keys: ['용띠','진띠','용 띠'], animal: '용', en: 'golden eastern dragon flying through golden fire, scales shimmering, majestic and powerful' },
  { keys: ['뱀띠','사띠','뱀 띠'], animal: '뱀', en: 'golden serpent coiled gracefully on a dark surface, scales gleaming gold, elegant S-curve pose' },
  { keys: ['말띠','오띠','말 띠'], animal: '말', en: 'golden horse galloping through golden light, mane flowing, powerful and free' },
  { keys: ['양띠','미띠','양 띠','염소띠'], animal: '양', en: 'golden goat standing serenely on a rock, soft golden wool, peaceful expression' },
  { keys: ['원숭이띠','신띠','원숭이 띠'], animal: '원숭이', en: 'golden monkey in a playful pose, bright eyes, arms reaching upward joyfully' },
  { keys: ['닭띠','유띠','닭 띠'], animal: '닭', en: 'golden rooster standing tall and proud, magnificent golden tail feathers fanned out' },
  { keys: ['개띠','술띠','개 띠'], animal: '개', en: 'golden dog sitting loyally, warm friendly expression, noble and dignified pose' },
  { keys: ['돼지띠','해띠','돼지 띠'], animal: '돼지', en: 'golden pig plump and shiny, smiling contentedly, small curly tail, prosperous energy' },
];

// 장면 유형 감지
function detectSceneType(text) {
  // 띠 감지
  for (const z of ZODIAC_MAP) {
    for (const k of z.keys) {
      if (text.includes(k)) return { type: 'zodiac', zodiac: z };
    }
  }
  // 마무리 감지
  const closingKeys = ['해당되는','흘려보내지','마무리','마지막으로','이상입니다','드렸습니다','복주머니','행운을','응원합니다','이번 주도'];
  for (const k of closingKeys) {
    if (text.includes(k)) return { type: 'closing' };
  }
  // 인트로
  return { type: 'intro' };
}

// 프롬프트 생성
function buildPrompt(type, zodiac, scriptText) {
  const base = 'vertical portrait 9:16, 3D photorealistic render, ultra high quality, rich golden glowing light, warm amber tones, dark deep background, golden light rays from center, sparkles and golden particles floating, cinematic dramatic lighting, no text no words';

  if (type === 'zodiac' && zodiac) {
    return `${zodiac.en}, glowing golden energy swirling around, golden fire particles, dark dramatic background, mystical atmosphere, ${base}`;
  }
  if (type === 'closing') {
    return `ornate red silk fortune pouch with golden 福 character embroidered on it, decorative gold tassel hanging below, gold coins orbiting in circular ring around the pouch, golden light rays bursting from center, dark background, mystical glow, prosperity and luck theme, ${base}`;
  }
  // intro
  return `Korean elderly woman in her 60s with warm smile and gray hair, holding Korean lotto ticket 로또6/45 with both hands, Korean 50000-won bills raining down from glowing golden sky, golden light rays shining from above, joyful and blessed expression, warm golden atmosphere, ${base}`;
}

function generate() {
  const script = document.getElementById('script').value.trim();
  if (!script) { alert('대본을 입력해주세요.'); return; }

  // 빈 줄 기준으로 문단 분리
  const paragraphs = script.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);

  if (paragraphs.length === 0) {
    document.getElementById('results').innerHTML = '<div class="error-box">문단을 인식하지 못했어요. 빈 줄로 문단을 나눠주세요.</div>';
    return;
  }

  const scenes = paragraphs.map((p, i) => {
    const detected = detectSceneType(p);
    const prompt = buildPrompt(detected.type, detected.zodiac, p);
    const typeLabel = detected.type === 'intro' ? '인트로' : detected.type === 'zodiac' ? `띠 · ${detected.zodiac.animal}` : '마무리';
    return { num: i + 1, text: p, typeLabel, prompt };
  });

  renderResults(scenes);
}

function renderResults(scenes) {
  const allPrompts = scenes.map(s => s.prompt).join('\n\n');
  let html = `
  <div class="results-header">
    <span class="section-label" style="margin:0;">생성된 프롬프트</span>
    <span class="results-count">${scenes.length}개 장면</span>
  </div>`;

  scenes.forEach((s, i) => {
    html += `
    <div class="scene-card" style="animation-delay:${i*0.07}s">
      <div class="scene-meta">
        <span class="scene-num">장면 ${s.num}</span>
        <span class="scene-type-badge">${s.typeLabel}</span>
      </div>
      <div class="scene-script">${escapeHtml(s.text)}</div>
      <div class="prompt-label">Flow 프롬프트</div>
      <div class="prompt-text" id="p${i}">${escapeHtml(s.prompt)}</div>
      <button class="card-copy-btn" onclick="copyOne(${i}, this)">복사</button>
    </div>`;
  });

  html += `<button class="copy-all-btn" id="copyAllBtn" onclick="copyAllFn(this)">✦ 전체 복사 — Lapin에 붙여넣기</button>`;
  document.getElementById('results').innerHTML = html;
  document.getElementById('results').dataset.all = allPrompts;
}

function copyOne(i, btn) {
  const text = document.getElementById('p'+i).innerText;
  copyToClipboard(text, btn, '복사');
}

function copyAllFn(btn) {
  const text = document.getElementById('results').dataset.all;
  copyToClipboard(text, btn, '✦ 전체 복사 — Lapin에 붙여넣기');
}

function copyToClipboard(text, btn, originalText) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ 복사됨!';
      setTimeout(() => btn.textContent = originalText, 2000);
    }).catch(() => fallbackCopy(text, btn, originalText));
  } else {
    fallbackCopy(text, btn, originalText);
  }
}

function fallbackCopy(text, btn, originalText) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.top = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = '✓ 복사됨!';
    setTimeout(() => btn.textContent = originalText, 2000);
  } catch(e) {
    btn.textContent = '직접 복사해주세요';
    setTimeout(() => btn.textContent = originalText, 3000);
  }
  document.body.removeChild(ta);
}

function reset() {
  document.getElementById('script').value = '';
  document.getElementById('results').innerHTML = '';
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
